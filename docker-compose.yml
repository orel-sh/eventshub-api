version: "3.8"

services:

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - elasticsearch
    restart: on-failure

  celery_worker:
    build: .
    command: celery -A app.tasks.email_tasks.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/var/lib/elasticsearch/data

volumes:
  esdata:
